version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boss_frontend
    ports:
      - "80:80"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boss_backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    restart: always
